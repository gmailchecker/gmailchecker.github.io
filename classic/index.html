<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
	<meta name="description" content="">
	<meta name="og:description" content="">
	<meta name="description" content="">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta http-equiv="expires" content="0">
	<meta name="referrer" content="never">
	<meta name="keywords" content="">
	<meta name="author" content="@S161774">
	<meta name="theme-color" content="#262626">
	<meta name="msapplication-navbutton-color" content="#262626">
	<meta name="apple-mobile-web-app-status-bar-style" content="#262626">
	<link rel="shortcut icon" href="gmail-checker.png">
	<meta name="og:title" content="Bulk Gmail checker">
	<meta name="title" content="Bulk Gmail checker">
	<meta name="og:type" content="website">
	<meta name="og:url" content="https://gmailchecker.github.io"><meta name="og:image" content="https://gmailchecker.github.io/gmail-checker.png"><title>Gmail Checker</title>
	<link href="https://fonts.cdnfonts.com/css/hello-ai" rel="stylesheet">
	<style>
	@import url('https://fonts.cdnfonts.com/css/hello-ai');
	</style>
	<link rel=stylesheet href="codemirror.css">
	<script src="codemirror.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<style>
	.box1{position:fixed;top:0;left:0;display:flex;justify-content:center;width:100%;height:100%;background:#f2e6d9}
	.box2{display:flex;flex-direction:column;gap:10px;position:relative;width:1025px;height:100%;padding:10px;overflow:hidden}
	header{display:flex;align-items:center;justify-content:center;width:100%;height:50px;gap:10px}
	.site_logo {width:30px}
	.title{font-family: 'Hello AI', sans-serif;color:#666666;padding-bottom:5px}
	.output{display:flex;flex-direction:column;width:100%;height:100%;}
	.executor{display:flex;justify-content:center;width:100%;height:100px;}
	.executor_btn{width:100px;height:50px;cursor:pointer}
	.CodeMirror-hscrollbar{display:none!important}
	#check_btn,#recheck_btn{background:#c68c53;border:3px #734d26; border-style:outset;border-radius:3px;color:#392613}
	
	.mail_input, .good_output, .ver_output, .dis_output, .notfound_output{position:relative;width:100%;height:100%}
	.mail_input .CodeMirror, .good_output .CodeMirror, .ver_output .CodeMirror, .dis_output .CodeMirror, .notfound_output .CodeMirror {position:absolute;width:100%;height:100%;background:#392613;color:#d9b38c}
	.act_button{display:flex;flex-direction:column;position:absolute;bottom:20px;right:20px;gap:5px}
	.paste_clip{background:#c68c53;position:absolute;top:20px;right:20px;cursor:pointer}
	.copy_clip{background:#c68c53;cursor:pointer}
	.file_download{background:#c68c53;cursor:pointer}
	
	.res_tab_menu{display:flex;align-items:center;width:100%;height:75px;background:#996633;color:#fff;border-bottom:5px solid #996633}
	.res_tab_menu h3{margin-left:10px;}
	.res_btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:5px;cursor:pointer;border-left:1px solid #996633;font-weight:bold}
	.badge{background:#734d26;height:20px;border-radius:5px;min-width:50px;text-align:center;font-weight:bold}
	#good_badge{color:#00cc99;}
	#ver_badge{color:#ffcc00;}
	#dis_badge{color:#ff3300;}
	#notfound_badge{color:#00ccff;font-weight:bold}
	.mode{display:flex;justify-content:center;align-items:center;flex-direction:column;gap:5px}
	.advanced_mode{width:150px;background:#d9b38c;color:#fff;text-align:center;cursor:pointer;border-radius:5px;padding:5px 0px 5px 0px;border:2px #392613;border-style:dotted}
	.speed_mode{width:150px;text-align:center;cursor:pointer;border-radius:5px;padding:5px 0px 5px 0px}
	
	.progress{font-size:12px;overflow: hidden;width:100%;background:#996633;}	
	.progress-bar{transition: width .6s ease; text-align: right;white-space: nowrap; color: #fff;background-color: #bf8040;}
	.progress-bar-striped{background-image: linear-gradient(45deg, rgba(255, 255, 255, .15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, .15) 75%, transparent 75%, transparent);background-size: .5rem .5rem;} 
	.progress-bar-animated{animation: progress-bar-stripes 1s linear infinite;}
	@media (prefers-reduced-motion: reduce){
	.progress-bar-animated{animation: none;}
	}
	@keyframes progress-bar-stripes{from{background-position: .5rem 0;}to{background-position: 0 0;}}
	@media (prefers-reduced-motion: reduce){
	.progress-bar{transition: none;}
	}
	
	::-webkit-scrollbar {width: 10px;}
	::-webkit-scrollbar-track {background: transparent; }
	::-webkit-scrollbar-thumb:hover {background: #555; }
	::-webkit-scrollbar-thumb {background: #bf8040; border:3px #000;border-style:outset; }


	@media only screen and (max-width: 767px){
	.res_tab_menu{zoom:60%}
	}


	</style>
</head>
<body>
<div class="box1">
	<div class="box2">
		<header>
			<image class="site_logo" src="gmail-checker.png">
			<h2 class="title"></image>GMAIL CHECKER</h2>
		</header>
		<div class="output">
			<div class="res_tab_menu">
				<h3>Enter Gmail here...</h3>
				<div class="res_btn" id="good_res">GOOD  <div class="badge"><span id='good_badge'></span></div></div>
				<div class="res_btn" id="ver_res">VER  <div class="badge"><span id='ver_badge'></span></div></div>
				<div class="res_btn" id="dis_res">DISABLED  <div class="badge"><span id='dis_badge'></span></div></div>
				<div class="res_btn" id="notfound_res">NOT FOUND  <div class="badge"><span id='notfound_badge'></div></div>
			</div>
			<div class="mail_input">
				<input type="email" id="mail_input"></input>
				<button class="paste_clip" id="paste_clip">Paste</button>
			</div>
			<div class="good_output">
				<input type="email" id="good_output"></input>
				<div class="act_button">
					<button class="copy_clip" id="copy_clip1">Copy</button>
					<button onclick='downloadFile(&#39;good&#39;)' class='file_download' id='good_download' >Download</button>
				</div>
			</div>
			<div class="ver_output">
				<input type="email" id="ver_output"></input>
				<div class="act_button">
					<button class="copy_clip" id="copy_clip2">Copy</button>
					<button onclick='downloadFile(&#39;ver&#39;)' class='file_download' id='ver_download' >Download</button>
				</div>
			</div>
			<div class="dis_output">
				<input type="email" id="dis_output"></input>
				<div class="act_button">
					<button class="copy_clip" id="copy_clip3">Copy</button>
					<button onclick='downloadFile(&#39;disable&#39;)' class='file_download' id='disable_download' >Download</button>
				</div>
			</div>
			<div class="notfound_output">
				<input type="email" id="notfound_output"></input>
				<div class="act_button">
					<button class="copy_clip" id="copy_clip4">Copy</button>
				</div>
			</div>
			<div class="progress progress-lg">
				<div id="mail-progress-bar" class="progress-bar progress-bar-striped" role="progressbar"
				style="width: 0%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">0%
				</div>
			</div>	
		</div>
		<div class="mode">
			<div class="advanced_mode" id="advanced_mode">Advanced Mode</div>
			<div class="speed_mode" id="speed_mode">Speed Mode</div>
		</div>
		<div class="executor">
			<button class="executor_btn" id="check_btn">Check Now</button>
			<button class="executor_btn" id="recheck_btn">Check Again</button>
		</div>
	</div>
</div>
<script>
$("#good_badge").text(" 0 ");
$("#ver_badge").text(" 0 ");
$("#dis_badge").text(" 0 ");
$("#notfound_badge").text(" 0 ");
$(".res_btn").hide();
$("#recheck_btn").hide();



document.querySelector(".good_output").style.cssText="width:0;height:0";
document.querySelector(".ver_output").style.cssText="width:0;height:0";
document.querySelector(".dis_output").style.cssText="width:0;height:0";
document.querySelector(".notfound_output").style.cssText="width:0;height:0";



$(document).on("click",
"#advanced_mode",
function() {
		document.querySelector(".advanced_mode").style.cssText="background:#d9b38c;color:#fff;border:2px #392613;border-style:dotted";
		document.querySelector(".speed_mode").style.cssText="background:none;color:#000;border:none";
		model = 1
		nums = 50;	
        });
		
$(document).on("click",
"#speed_mode",
function() {
		document.querySelector(".advanced_mode").style.cssText="background:none;color:#000;border:none";
		document.querySelector(".speed_mode").style.cssText="background:#d9b38c;color:#fff;border:2px #392613;border-style:dotted";
		model = 3;
		nums = 100;	
        });		

$(document).on("click",
"#good_res",
function() {
		document.querySelector("#good_res").style.cssText="background:#996633;color:#fff";
		document.querySelector("#ver_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#dis_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#notfound_res").style.cssText="background:none;color:#cccccc";
		document.querySelector(".good_output").style.cssText="width:100%;height:100%";	
		document.querySelector(".ver_output").style.cssText="width:0;height:0";
		document.querySelector(".dis_output").style.cssText="width:0;height:0";
		document.querySelector(".notfound_output").style.cssText="width:0;height:0";
        });

$(document).on("click",
"#ver_res",
function() {
		document.querySelector("#good_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#ver_res").style.cssText="background:#996633;color:#fff";
		document.querySelector("#dis_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#notfound_res").style.cssText="background:none;color:#cccccc";
		document.querySelector(".good_output").style.cssText="width:0;height:0";		
		document.querySelector(".ver_output").style.cssText="width:100%;height:100%";
		document.querySelector(".dis_output").style.cssText="width:0;height:0";
		document.querySelector(".notfound_output").style.cssText="width:0;height:0";
        });

$(document).on("click",
"#dis_res",
function() {
		document.querySelector("#good_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#ver_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#dis_res").style.cssText="background:#996633;color:#fff";
		document.querySelector("#notfound_res").style.cssText="background:none;color:#cccccc";
		document.querySelector(".good_output").style.cssText="width:0;height:0";		
		document.querySelector(".ver_output").style.cssText="width:0;height:0";
		document.querySelector(".dis_output").style.cssText="width:100%;height:100%";
		document.querySelector(".notfound_output").style.cssText="width:0;height:0";
        });

$(document).on("click",
"#notfound_res",
function() {
		document.querySelector("#good_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#ver_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#dis_res").style.cssText="background:none;color:#cccccc";
		document.querySelector("#notfound_res").style.cssText="background:#996633;color:#fff";
		document.querySelector(".good_output").style.cssText="width:0;height:0";		
		document.querySelector(".ver_output").style.cssText="width:0;height:0";
		document.querySelector(".dis_output").style.cssText="width:0;height:0";
		document.querySelector(".notfound_output").style.cssText="width:100%;height:100%";
        });
		


</script>

<script src="jquery.js"></script>
<script src="spin.js"></script>
<script src="jquery.spin.js"></script>
<script src="abp.js"></script>
<script src="abp.spin.js"></script>
<script src="axios.min.js"></script>
<script src="index.js"></script>
<script src="toastr.min.js"></script>
<script src="abp.toastr.js"></script>	
</body>
</html>
